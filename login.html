{% extends "base.html" %}

{% block title %}Log In - Veritas AI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
            <div
                style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); padding: 1rem; border-radius: 16px; display: inline-flex;">
                <i class="ph ph-fingerprint" style="font-size: 2.5rem; color: var(--primary);"></i>
            </div>
        </div>

        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Welcome back</h2>
        <p style="margin-bottom: 2rem;">Sign in to your account to continue</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autocomplete="username"
                    placeholder="john.doe">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem;">
                Sign In
            </button>
        </form>

        <div
            style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account?
            <a href="{{ url_for('register') }}" style="font-weight: 500;">Request Access</a>
        </div>
    </div>
</div>
{% endblock %}
